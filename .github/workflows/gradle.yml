name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 25
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: burrunan/gradle-cache-action@v3.0.1
        name: Build BiomeTool
        with:
          arguments: shadowJarAll createLauncherScripts
          gradle-version: wrapper
          properties: |
            kotlin.js.compiler=ir
            kotlin.parallel.tasks.in.project=true

      - name: Upload distribution artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: BiomeTool-${{ github.sha }}
          path: |
            build/libs/BiomeTool-*-all.jar
            build/libs/BiomeTool.bat
            build/libs/BiomeTool.sh

      - name: Release
        uses: softprops/action-gh-release@v2.2.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/libs/BiomeTool-*-all.jar
            build/libs/BiomeTool.bat
            build/libs/BiomeTool.sh
