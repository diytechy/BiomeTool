name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix gradlew permissions
        run: chmod +x ./gradlew

      # Tag built from the merge commit's short SHA + UTC date so every merge
      # to main/master produces a unique, sortable release tag without manual
      # semver bumping.
      - name: Compute release tag
        id: tag
        run: |
          short_sha=$(git rev-parse --short HEAD)
          date_str=$(date -u +%Y%m%d)
          tag="VIBE-${date_str}-${short_sha}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Build distribution
        run: ./gradlew build

      - name: List built artifacts
        run: ls -la build/libs/

      # Rename the bundled distribution zip so the release asset carries the
      # VIBE marker. The user downloads one zip, unzips it, and runs the
      # launcher inside — no other steps required.
      - name: Rename distribution zip with VIBE marker
        run: |
          mkdir -p release-artifacts
          src=$(ls build/libs/BiomeTool-*.zip | head -n1)
          if [ -z "$src" ]; then
            echo "ERROR: No BiomeTool-*.zip produced by build"
            exit 1
          fi
          base=$(basename "$src")
          renamed=$(echo "$base" | sed 's/^BiomeTool-/BiomeTool-VIBE-/')
          cp "$src" "release-artifacts/$renamed"
          echo "  $base -> $renamed"
          ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/BiomeTool-VIBE-*.zip
